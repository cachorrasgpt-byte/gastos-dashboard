<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gastos Tickets — Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #f5f4f0;
    --surface:   #ffffff;
    --surface-2: #f0eeea;
    --border:    rgba(0,0,0,0.09);
    --border-strong: rgba(0,0,0,0.16);
    --text:      #0f0f0e;
    --text-2:    #52514e;
    --text-3:    #898781;
    --radius:    8px;
    --accent:    #2a78d6;
    --accent-bg: #e8f1fc;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:        #131312;
      --surface:   #1e1e1c;
      --surface-2: #262624;
      --border:    rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.14);
      --text:      #f0efe9;
      --text-2:    #b0afa8;
      --text-3:    #6e6d69;
      --accent-bg: #1a2d45;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* Layout */
  .shell { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem 3rem; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 1.25rem 0 1rem;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
  }
  .header-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent); display: flex; align-items: center; justify-content: center;
  }
  .header-icon i { color: #fff; font-size: 18px; }
  .header h1 { font-size: 17px; font-weight: 600; }
  .header-sub { font-size: 12px; color: var(--text-3); margin-top: 1px; }
  .header-spacer { flex: 1; }

  /* Config panel */
  .config {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
  }
  .config-label {
    font-size: 11px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.06em;
    margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
  }
  .config-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .config-row input {
    flex: 1; min-width: 200px;
    padding: 7px 11px; font-size: 13px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface-2); color: var(--text);
    outline: none;
  }
  .config-row input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-bg); }
  .config-row input::placeholder { color: var(--text-3); }
  .status {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--text-3);
    padding: 0 4px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .dot-idle { background: var(--text-3); }
  .dot-ok   { background: #1baf7a; }
  .dot-err  { background: #e34948; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; font-size: 13px; font-weight: 500;
    border-radius: var(--radius); cursor: pointer;
    border: 0.5px solid var(--border-strong);
    background: var(--surface-2); color: var(--text);
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn:hover { background: var(--border); }
  .btn-accent {
    background: var(--accent); color: #fff;
    border-color: transparent;
  }
  .btn-accent:hover { background: #1a68c6; }
  .btn i { font-size: 15px; }

  /* Topbar */
  .topbar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 1.25rem;
  }
  .topbar select, .topbar input[type=text] {
    padding: 7px 10px; font-size: 13px;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    background: var(--surface); color: var(--text);
    outline: none;
  }
  .topbar select:focus, .topbar input[type=text]:focus {
    border-color: var(--accent);
  }
  .topbar-spacer { flex: 1; }

  /* KPIs */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px; margin-bottom: 1.25rem;
  }
  .kpi {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1rem 1.1rem;
  }
  .kpi-label { font-size: 11px; color: var(--text-3); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-value { font-size: 22px; font-weight: 600; color: var(--text); letter-spacing: -0.5px; }
  .kpi-sub { font-size: 11px; color: var(--text-3); margin-top: 3px; }

  /* Charts */
  .charts-row {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-bottom: 1.25rem;
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px; padding: 1rem 1.25rem;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.05em;
    margin-bottom: 0.85rem;
  }
  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-2); }
  .legend-sq { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 8px 10px;
    font-size: 11px; font-weight: 600; color: var(--text-3);
    border-bottom: 0.5px solid var(--border);
    text-transform: uppercase; letter-spacing: 0.04em;
    white-space: nowrap;
  }
  td { padding: 9px 10px; border-bottom: 0.5px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: var(--surface-2); }

  .badge {
    display: inline-block; font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 100px;
  }
  .avatar {
    width: 26px; height: 26px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; flex-shrink: 0;
  }
  .thumb {
    width: 34px; height: 34px; border-radius: 6px;
    object-fit: cover; cursor: pointer;
    border: 0.5px solid var(--border); display: block;
  }
  .thumb-empty {
    width: 34px; height: 34px; border-radius: 6px;
    background: var(--surface-2); border: 0.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    color: var(--text-3);
  }

  /* Presupuestos */
  .pres-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px; margin-top: 4px;
  }
  .pres-item {}
  .pres-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; }
  .pres-cat { color: var(--text-2); }
  .pres-pct { font-weight: 600; }
  .pres-bar { height: 5px; border-radius: 3px; background: var(--surface-2); overflow: hidden; }
  .pres-fill { height: 100%; border-radius: 3px; }
  .pres-amounts { font-size: 11px; color: var(--text-3); margin-top: 4px; }

  /* Empty */
  .empty { text-align: center; padding: 2.5rem; color: var(--text-3); }
  .empty i { font-size: 32px; margin-bottom: 8px; display: block; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.8); z-index: 999;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal-img { max-width: 92vw; max-height: 88vh; border-radius: 10px; display: block; }
  .modal-close {
    position: fixed; top: 20px; right: 20px;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.15); border: none; color: #fff;
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }

  /* Spinner */
  .spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    animation: spin 0.7s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--text); color: var(--bg);
    padding: 10px 18px; border-radius: var(--radius);
    font-size: 13px; font-weight: 500; opacity: 0;
    transition: opacity 0.2s; pointer-events: none; z-index: 9999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  @media (max-width: 640px) {
    .charts-row { grid-template-columns: 1fr; }
    .config-row { flex-direction: column; align-items: stretch; }
    .topbar { gap: 6px; }
  }
</style>
</head>
<body>

<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-icon"><i class="ti ti-receipt"></i></div>
    <div>
      <h1>Gastos Tickets</h1>
      <div class="header-sub">Panel de control — conectado a Google Sheets vía n8n</div>
    </div>
    <div class="header-spacer"></div>
    <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i>Exportar CSV</button>
  </div>

  <!-- Config -->
  <div class="config">
    <div class="config-label"><i class="ti ti-plug" style="font-size:13px"></i>Conexión con n8n</div>
    <div class="config-row">
      <input type="text" id="webhookUrl" placeholder="https://TU-INSTANCIA.app.n8n.cloud/webhook/gastos-tickets" />
      <input type="password" id="apiKey" placeholder="x-api-key" style="max-width:180px;" />
      <button class="btn btn-accent" id="btnConectar" onclick="conectar()">
        <i class="ti ti-refresh"></i>Conectar
      </button>
      <div class="status" id="connStatus">
        <span class="dot dot-idle"></span>
        <span id="connText">Sin conectar — mostrando datos de ejemplo</span>
      </div>
    </div>
  </div>

  <!-- Filtros -->
  <div class="topbar">
    <select id="filtroMes" onchange="renderAll()">
      <option value="all">Todos los meses</option>
    </select>
    <select id="filtroCat" onchange="renderAll()">
      <option value="all">Todas las categorías</option>
      <option value="supermercado">Supermercado</option>
      <option value="restaurante">Restaurante</option>
      <option value="delivery">Delivery</option>
      <option value="farmacia">Farmacia</option>
      <option value="transporte">Transporte</option>
      <option value="combustible">Combustible</option>
      <option value="entretenimiento">Entretenimiento</option>
      <option value="hogar">Hogar</option>
      <option value="servicios">Servicios</option>
    </select>
    <select id="filtroUsuario" onchange="renderAll()">
      <option value="all">Todos los usuarios</option>
    </select>
    <input type="text" id="busqueda" placeholder="Buscar comercio..." oninput="renderAll()" style="width:150px;" />
    <div class="topbar-spacer"></div>
    <span id="totalBadge" style="font-size:12px;color:var(--text-3);"></span>
  </div>

  <!-- KPIs -->
  <div class="kpi-row" id="kpis"></div>

  <!-- Charts -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">Gasto por categoría</div>
      <div class="legend" id="legendCat"></div>
      <div style="position:relative;height:210px;">
        <canvas id="chartCat" role="img" aria-label="Gasto por categoría"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Gasto por usuario</div>
      <div class="legend" id="legendUser"></div>
      <div style="position:relative;height:210px;">
        <canvas id="chartUser" role="img" aria-label="Gasto por usuario"></canvas>
      </div>
    </div>
  </div>

  <!-- Presupuestos -->
  <div class="card" style="margin-bottom:10px;">
    <div class="card-title">Presupuestos del mes</div>
    <div id="presupuestos"></div>
  </div>

  <!-- Tabla -->
  <div class="card">
    <div class="card-title">Tickets registrados</div>
    <div class="table-wrap">
      <div id="tabla"></div>
    </div>
  </div>

</div>

<!-- Modal foto -->
<div class="modal-overlay" id="modalOverlay" onclick="cerrarModal()">
  <button class="modal-close" onclick="cerrarModal()"><i class="ti ti-x"></i></button>
  <img class="modal-img" id="modalImg" src="" alt="Foto del comprobante" onclick="event.stopPropagation()" />
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── Datos de ejemplo ── */
const EJEMPLO = [
  {fecha:'2025-06-27',comercio:'Carrefour Palermo',categoria:'supermercado',monto:47800,descripcion:'Compra semanal',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-06-26',comercio:'Rappi',categoria:'delivery',monto:15200,descripcion:'Sushi + bebidas',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-06-25',comercio:'Shell YPF',categoria:'combustible',monto:38500,descripcion:'Nafta premium',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-06-24',comercio:'La Parolaccia',categoria:'restaurante',monto:22400,descripcion:'Almuerzo',foto_url:'',usuario:'Laura'},
  {fecha:'2025-06-23',comercio:'Farmacity',categoria:'farmacia',monto:8900,descripcion:'Vitaminas',foto_url:'',usuario:'Laura'},
  {fecha:'2025-06-22',comercio:'Moovit',categoria:'transporte',monto:3200,descripcion:'Carga SUBE',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-06-21',comercio:'Netflix',categoria:'entretenimiento',monto:5999,descripcion:'Suscripción',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-06-20',comercio:'Coto',categoria:'supermercado',monto:31200,descripcion:'Quincena',foto_url:'',usuario:'Laura'},
  {fecha:'2025-06-18',comercio:'Easy',categoria:'hogar',monto:18700,descripcion:'Materiales baño',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-06-15',comercio:'Edesur',categoria:'servicios',monto:12400,descripcion:'Factura luz',foto_url:'',usuario:'Laura'},
  {fecha:'2025-05-30',comercio:'Coto',categoria:'supermercado',monto:52400,descripcion:'Compra mensual',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-05-22',comercio:'Shell',categoria:'combustible',monto:35000,descripcion:'Nafta',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-05-18',comercio:'PedidosYa',categoria:'delivery',monto:13200,descripcion:'Pollo + empanadas',foto_url:'',usuario:'Laura'},
  {fecha:'2025-05-15',comercio:'Netflix',categoria:'entretenimiento',monto:5999,descripcion:'Suscripción',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-04-28',comercio:'Carrefour Belgrano',categoria:'supermercado',monto:44200,descripcion:'Compra mensual',foto_url:'',usuario:'Manuel'},
  {fecha:'2025-04-22',comercio:'Rappi',categoria:'delivery',monto:8900,descripcion:'Hamburguesas',foto_url:'',usuario:'Laura'},
];

const CAT_COLORS = {
  supermercado:'#2a78d6', restaurante:'#1baf7a', delivery:'#eda100',
  combustible:'#e34948', entretenimiento:'#4a3aa7', farmacia:'#e87ba4',
  transporte:'#eb6834', hogar:'#008300', servicios:'#888780', otro:'#73726c'
};
const CAT_LABEL = {
  supermercado:'Supermercado', restaurante:'Restaurante', delivery:'Delivery',
  combustible:'Combustible', entretenimiento:'Entretenimiento', farmacia:'Farmacia',
  transporte:'Transporte', hogar:'Hogar', servicios:'Servicios', otro:'Otro'
};
const USER_COLORS = ['#2a78d6','#1baf7a','#eda100','#e34948','#4a3aa7','#eb6834','#e87ba4'];
const PRESUPUESTOS = {
  supermercado:200000, restaurante:60000, delivery:50000,
  combustible:120000, entretenimiento:20000, farmacia:30000,
  transporte:20000, hogar:50000, servicios:35000,
};

let DATOS = [...EJEMPLO];
let chartCat = null, chartUser = null;

/* ── Helpers ── */
function fmt(n) {
  return '$ ' + Math.round(n).toLocaleString('es-AR');
}
function userColor(name) {
  return USER_COLORS[[...name].reduce((a,c)=>a+c.charCodeAt(0),0) % USER_COLORS.length];
}
function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}
function toast(msg, ms=2800) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

/* ── Conexión ── */
async function conectar() {
  const url = document.getElementById('webhookUrl').value.trim();
  const key = document.getElementById('apiKey').value.trim();
  if (!url) { toast('Pegá la URL del webhook primero'); return; }

  const btn = document.getElementById('btnConectar');
  btn.innerHTML = '<span class="spinner"></span> Conectando...';
  btn.disabled = true;
  setStatus('idle', 'Conectando...');

  try {
    const headers = { 'Content-Type': 'application/json' };
    if (key) headers['x-api-key'] = key;

    const res = await fetch(url, { headers });
    if (!res.ok) throw new Error('Error HTTP ' + res.status);

    const raw = await res.json();
    const arr = Array.isArray(raw) ? raw : (raw.data || raw.items || Object.values(raw)[0] || []);

    DATOS = arr.map(r => ({
      fecha:       normFecha(r.fecha || r.Fecha || ''),
      comercio:    (r.comercio    || r.Comercio    || '').trim(),
      categoria:   (r.categoria   || r.Categoría   || r.Categoria || 'otro').toLowerCase().trim(),
      monto:       normMonto(r.monto || r.Monto),
      descripcion: (r.descripcion || r.Descripción || r.Descripcion || '').trim(),
      foto_url:    (r.foto_url    || r.Foto        || r.foto || '').trim(),
      usuario:     (r.usuario     || r.Usuario     || 'sin asignar').trim(),
    }));

    setStatus('ok', DATOS.length + ' tickets cargados desde tu Sheet');
    toast('✓ ' + DATOS.length + ' tickets cargados');
    poblarFiltros();
    renderAll();

    // Guardar en localStorage para la próxima visita
    localStorage.setItem('gw_url', url);
    localStorage.setItem('gw_key', key);

  } catch(e) {
    setStatus('err', 'Error: ' + e.message);
    toast('No se pudo conectar — revisá la URL y el CORS en n8n');
  }

  btn.innerHTML = '<i class="ti ti-refresh"></i>Reconectar';
  btn.disabled = false;
}

function normFecha(f) {
  if (!f) return '';
  f = String(f).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(f)) return f.slice(0,10);
  if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(f)) {
    const [d,m,y] = f.split('/');
    return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
  }
  return f;
}
function normMonto(v) {
  if (!v && v !== 0) return 0;
  return parseFloat(String(v).replace(/[^0-9,.-]/g,'').replace(',','.')) || 0;
}

function setStatus(type, msg) {
  const dot = document.querySelector('#connStatus .dot');
  dot.className = 'dot dot-' + type;
  document.getElementById('connText').textContent = msg;
}

/* ── Filtros ── */
function poblarFiltros() {
  const meses = [...new Set(DATOS.map(g=>g.fecha.slice(0,7)))].filter(Boolean).sort().reverse();
  const sel = document.getElementById('filtroMes');
  sel.innerHTML = '<option value="all">Todos los meses</option>' + meses.map(m => {
    const [y,mo] = m.split('-');
    const label = new Date(+y, +mo-1, 1).toLocaleString('es-AR',{month:'long',year:'numeric'});
    return `<option value="${m}">${label.charAt(0).toUpperCase()+label.slice(1)}</option>`;
  }).join('');

  const usuarios = [...new Set(DATOS.map(g=>g.usuario))].filter(Boolean).sort();
  const selU = document.getElementById('filtroUsuario');
  selU.innerHTML = '<option value="all">Todos los usuarios</option>' +
    usuarios.map(u=>`<option value="${u}">${u}</option>`).join('');
}

function filtrar() {
  const mes  = document.getElementById('filtroMes').value;
  const cat  = document.getElementById('filtroCat').value;
  const user = document.getElementById('filtroUsuario').value;
  const q    = document.getElementById('busqueda').value.toLowerCase();
  return DATOS.filter(g =>
    (mes  === 'all' || g.fecha.startsWith(mes)) &&
    (cat  === 'all' || g.categoria === cat) &&
    (user === 'all' || g.usuario === user) &&
    (!q || g.comercio.toLowerCase().includes(q) || g.descripcion.toLowerCase().includes(q))
  );
}

/* ── Render ── */
function renderAll() {
  const d = filtrar();
  document.getElementById('totalBadge').textContent = d.length + ' ticket' + (d.length!==1?'s':'');
  renderKPIs(d);
  renderCharts(d);
  renderPresupuestos(d);
  renderTabla(d);
}

function renderKPIs(d) {
  const total = d.reduce((a,g)=>a+g.monto, 0);
  const prom  = d.length ? total/d.length : 0;
  const usuarios = [...new Set(d.map(g=>g.usuario))].length;
  const cats     = [...new Set(d.map(g=>g.categoria))].length;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">Total gastado</div>
      <div class="kpi-value">${fmt(total)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Tickets</div>
      <div class="kpi-value">${d.length}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Promedio por ticket</div>
      <div class="kpi-value">${fmt(prom)}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Usuarios activos</div>
      <div class="kpi-value">${usuarios}</div>
      <div class="kpi-sub">${cats} categoría${cats!==1?'s':''}</div>
    </div>
  `;
}

function renderCharts(d) {
  /* Por categoría */
  const porCat = {};
  d.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + g.monto; });
  const catKeys = Object.keys(porCat).sort((a,b)=>porCat[b]-porCat[a]);

  document.getElementById('legendCat').innerHTML = catKeys.map(c =>
    `<div class="legend-item"><span class="legend-sq" style="background:${CAT_COLORS[c]||'#888'}"></span>${CAT_LABEL[c]||c}</div>`
  ).join('');

  if (chartCat) chartCat.destroy();
  chartCat = new Chart(document.getElementById('chartCat'), {
    type: 'bar',
    data: {
      labels: catKeys.map(c => CAT_LABEL[c]||c),
      datasets: [{ data: catKeys.map(c=>porCat[c]), backgroundColor: catKeys.map(c=>CAT_COLORS[c]||'#888'), borderRadius: 4, borderSkipped: 'bottom' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) } } },
      scales: {
        x: { ticks: { color: '#898781', font: { size: 11 } }, grid: { display: false } },
        y: { ticks: { color: '#898781', font: { size: 11 }, callback: v => '$' + Math.round(v/1000) + 'k' }, grid: { color: 'rgba(128,128,128,0.08)' } }
      }
    }
  });

  /* Por usuario */
  const porUser = {};
  d.forEach(g => { porUser[g.usuario] = (porUser[g.usuario]||0) + g.monto; });
  const uKeys = Object.keys(porUser).sort((a,b)=>porUser[b]-porUser[a]);
  const uColors = uKeys.map((_,i) => USER_COLORS[i % USER_COLORS.length]);

  document.getElementById('legendUser').innerHTML = uKeys.map((u,i) =>
    `<div class="legend-item"><span class="legend-sq" style="background:${uColors[i]}"></span>${u}</div>`
  ).join('');

  if (chartUser) chartUser.destroy();
  chartUser = new Chart(document.getElementById('chartUser'), {
    type: 'doughnut',
    data: {
      labels: uKeys,
      datasets: [{ data: uKeys.map(u=>porUser[u]), backgroundColor: uColors, borderWidth: 3, borderColor: getComputedStyle(document.documentElement).getPropertyValue('--surface').trim() || '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmt(ctx.raw) } } }
    }
  });
}

function renderPresupuestos(d) {
  const porCat = {};
  d.forEach(g => { porCat[g.categoria] = (porCat[g.categoria]||0) + g.monto; });
  const cats = Object.keys(PRESUPUESTOS);
  document.getElementById('presupuestos').innerHTML = `<div class="pres-grid">` +
    cats.map(c => {
      const gasto = porCat[c] || 0;
      const pres  = PRESUPUESTOS[c];
      const pct   = Math.min(100, Math.round(gasto / pres * 100));
      const color = pct > 90 ? '#e34948' : pct > 70 ? '#eda100' : '#1baf7a';
      return `<div class="pres-item">
        <div class="pres-header">
          <span class="pres-cat">${CAT_LABEL[c]}</span>
          <span class="pres-pct" style="color:${color}">${pct}%</span>
        </div>
        <div class="pres-bar"><div class="pres-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="pres-amounts">${fmt(gasto)} / ${fmt(pres)}</div>
      </div>`;
    }).join('') + `</div>`;
}

function renderTabla(d) {
  if (!d.length) {
    document.getElementById('tabla').innerHTML = `<div class="empty"><i class="ti ti-receipt-off"></i>No hay tickets con los filtros actuales.</div>`;
    return;
  }
  const sorted = [...d].sort((a,b) => b.fecha.localeCompare(a.fecha));
  document.getElementById('tabla').innerHTML = `<table>
    <thead><tr>
      <th>Foto</th><th>Fecha</th><th>Comercio</th>
      <th>Categoría</th><th>Descripción</th><th>Usuario</th>
      <th style="text-align:right">Monto</th>
    </tr></thead>
    <tbody>${sorted.map(g => {
      const fotoCell = g.foto_url
        ? `<img class="thumb" src="${g.foto_url}" alt="Foto" onclick="abrirModal('${g.foto_url.replace(/'/g,'')}')" />`
        : `<div class="thumb-empty"><i class="ti ti-photo" style="font-size:15px"></i></div>`;
      const col = userColor(g.usuario);
      const av  = `<div class="avatar" style="background:${col}22;color:${col}">${initials(g.usuario)}</div>`;
      const fecha = g.fecha ? g.fecha.split('-').reverse().join('/') : '—';
      const catColor = CAT_COLORS[g.categoria] || '#888';
      return `<tr>
        <td>${fotoCell}</td>
        <td style="color:var(--text-3);white-space:nowrap;font-size:12px">${fecha}</td>
        <td style="font-weight:600">${g.comercio||'—'}</td>
        <td><span class="badge" style="background:${catColor}1a;color:${catColor}">${CAT_LABEL[g.categoria]||g.categoria}</span></td>
        <td style="color:var(--text-2)">${g.descripcion||'—'}</td>
        <td><div style="display:flex;align-items:center;gap:7px">${av}<span style="font-size:12px">${g.usuario}</span></div></td>
        <td style="text-align:right;font-weight:600;white-space:nowrap">${fmt(g.monto)}</td>
      </tr>`;
    }).join('')}</tbody>
  </table>`;
}

/* ── Modal ── */
function abrirModal(url) {
  document.getElementById('modalImg').src = url;
  document.getElementById('modalOverlay').classList.add('open');
}
function cerrarModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

/* ── Export CSV ── */
function exportCSV() {
  const d = filtrar();
  if (!d.length) { toast('No hay datos para exportar'); return; }
  const header = ['Fecha','Comercio','Categoría','Monto','Descripción','Foto URL','Usuario'];
  const rows   = d.map(g => [g.fecha, g.comercio, CAT_LABEL[g.categoria]||g.categoria, g.monto, g.descripcion, g.foto_url, g.usuario]);
  const csv    = [header,...rows].map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href     = 'data:text/csv;charset=utf-8,\uFEFF' + encodeURIComponent(csv);
  a.download = 'gastos_tickets.csv';
  a.click();
  toast('CSV descargado (' + d.length + ' tickets)');
}

/* ── Init ── */
function init() {
  // Restaurar URL/key guardados
  const savedUrl = localStorage.getItem('gw_url');
  const savedKey = localStorage.getItem('gw_key');
  if (savedUrl) document.getElementById('webhookUrl').value = savedUrl;
  if (savedKey) document.getElementById('apiKey').value = savedKey;

  poblarFiltros();
  renderAll();

  // Auto-conectar si hay URL guardada
  if (savedUrl) conectar();
}

init();
</script>
</body>
</html>
